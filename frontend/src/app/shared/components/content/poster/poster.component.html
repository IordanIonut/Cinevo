<section
  class="relative flex flex-row items-end w-64 h-[26rem] opacity-custom hover:scale-105"
>
  <img
    #posterImg
    [src]="
      hovered$()
        ? currentImage()?.file_path ?? data$().poster_path
        : data$().poster_path
    "
    [alt]="data$().title"
    class="absolute top-2 left-1/2 -translate-x-1/2 h-54 w-48 rounded-lg object-cover shadow-xl z-50 hover:scale-102"
    (mouseenter)="onPosterHoverEnter(data$())"
    (mouseleave)="onPosterHoverLeave()"
    (focus)="onPosterHoverEnter(data$())"
    (blur)="onPosterHoverLeave()"
  />

  <app-percent [percent$]="data$().vote_average"></app-percent>

  <div class="mosaic-wrapper" [style.width.px]="300" [style.height.px]="300">
    <div
      class="mosaic-grid"
      [ngStyle]="{
        'grid-template-columns': 'repeat(' + cols + ', 1fr)',
        'grid-template-rows': 'repeat(' + rows + ', 1fr)'
      }"
    >
      <div
        *ngFor="let color of flatGrid; let i = index"
        class="mosaic-cell"
        [style.background]="color"
        [attr.data-index]="i"
      ></div>
    </div>
  </div>
